<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塩分濃度測定</title>

<style>

body {
    font-family: sans-serif;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.section {
    border: 2px solid #ccc;
    border-radius: 10px;
    padding: 20px;
    background-color: #eef6ff;
}

input {
    width: 90%;
    padding: 12px;
    font-size: 18px;
}

button {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    background: white;
    padding: 15px;
    border-radius: 8px;
}

.final-result {
    color: red;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
}

hr {
    margin: 15px 0;
}

</style>
</head>

<body>

<h1>塩分濃度測定</h1>

<div class="section">

    <p>測定値（S/m）</p>

    <input
        id="value"
        type="number"
        step="any"
        placeholder="数値を入力">

    <p>採取面積（cm²）</p>

    <input
        id="area"
        type="number"
        step="any"
        placeholder="採取面積を入力">

    <br><br>

    <button onclick="calculate()">
        計算
    </button>

    <div id="result" class="result"></div>

</div>

<script>

function calculate() {

    const value = parseFloat(
        document.getElementById("value").value
    );

    const area = parseFloat(
        document.getElementById("area").value
    );

    if (isNaN(value) || isNaN(area) || area <= 0) {

        document.getElementById("result").innerHTML =
        "<p>測定値と採取面積を入力してください</p>";

        return;
    }

    const conductivity = value * 10000;
    const saltAmount = conductivity * 0.095;
    const density = saltAmount / area;

    document.getElementById("result").innerHTML = `

    <h3>使用公式</h3>

    <p>
    導電率（μS/cm）<br>
    ＝ 導電率（S/m）×10000
    </p>

    <p>
    塩分量（mg）<br>
    ＝ 導電率（μS/cm）×0.095（定数）
    </p>

    <p>
    等価塩分付着密度（mg/cm²）<br>
    ＝ 塩分量（mg）÷採取面積（cm²）
    </p>

    <hr>

    <h3>計算過程</h3>

    <p>
    <strong>① 導電率換算</strong><br>
    ${value} × 10000<br>
    ＝ ${conductivity.toFixed(2)} μS/cm
    </p>

    <p>
    <strong>② 塩分量計算</strong><br>
    ${conductivity.toFixed(2)} × 0.095<br>
    ＝ ${saltAmount.toFixed(2)} mg
    </p>

    <p>
    <strong>③ 等価塩分付着密度計算</strong><br>
    ${saltAmount.toFixed(2)} ÷ ${area} cm²<br>
    ＝ ${density.toFixed(4)} mg/cm²
    </p>

    <hr>

    <div class="final-result">
    最終結果<br>
    等価塩分付着密度<br>
    ${density.toFixed(4)} mg/cm²
    </div>

    `;

}

</script>

</body>
</html>
